<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attention Trainer</title>
<style>
  :root {
    --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f5;
    --color-background-tertiary: #ebebeb;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #737373;
    --color-text-tertiary: #a3a3a3;
    --color-border-secondary: #e0e0e0;
    --color-border-tertiary: #ebebeb;
    --border-radius-md: 10px;
    --border-radius-lg: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #141414;
      --color-background-secondary: #222222;
      --color-background-tertiary: #2e2e2e;
      --color-text-primary: #f0f0f0;
      --color-text-secondary: #888888;
      --color-text-tertiary: #555555;
      --color-border-secondary: #333333;
      --color-border-tertiary: #2a2a2a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); -webkit-text-size-adjust: 100%; }
  #app { padding: 1rem; max-width: 420px; margin: 0 auto; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 0.5rem; text-align: center; }
  .metric-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; letter-spacing: 0.04em; text-transform: uppercase; }
  .metric-value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .metric-value.muted { color: var(--color-text-tertiary); }
  #tap-zone { width: 100%; height: min(55vw, 240px); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: background 0.15s; background: var(--color-background-secondary); -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  #tap-zone:active { background: var(--color-background-tertiary); }
  #tap-zone.listening { border-color: transparent; background: #E1F5EE; }
  @media (prefers-color-scheme: dark) { #tap-zone.listening { background: #04342C; } }
  #tap-zone.tone-active { background: #E6F1FB; border-color: transparent; }
  @media (prefers-color-scheme: dark) { #tap-zone.tone-active { background: #042C53; } }
  #tap-zone.missed { background: #FCEBEB; border-color: transparent; }
  @media (prefers-color-scheme: dark) { #tap-zone.missed { background: #501313; } }
  #status-icon { font-size: 36px; margin-bottom: 6px; line-height: 1; }
  #status-text { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  #status-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
  .btn { border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); border-radius: var(--border-radius-md); padding: 10px 20px; font-size: 14px; cursor: pointer; font-family: var(--font-sans); }
  .btn:hover { background: var(--color-background-secondary); }
  .btn.primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .btn.primary:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  select, input[type=number] { font-family: var(--font-sans); }
  .row { display: flex; gap: 6px; align-items: center; }
  .tone-input { width: 48px; min-width: 0; padding: 8px 4px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; text-align: center; font-family: var(--font-sans); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .history-item { font-size: 13px; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; justify-content: space-between; color: var(--color-text-secondary); }
  .history-item span { color: var(--color-text-primary); font-weight: 500; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>
<body>
<div id="app">
  <h2 class="sr-only">Attention trainer: tap when the tone stops</h2>

  <div style="margin-bottom: 1rem;">
    <div class="row" style="margin-bottom: 10px;">
      <div style="flex:1;">
        <div class="metric-label" style="margin-bottom:6px;">Session duration</div>
        <select id="dur-select" style="width:100%; padding: 8px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px;">
          <option value="2">2 min</option>
          <option value="3">3 min</option>
          <option value="4">4 min</option>
          <option value="5">5 min</option>
          <option value="6">6 min</option>
          <option value="7">7 min</option>
          <option value="8">8 min</option>
          <option value="9">9 min</option>
          <option value="10" selected>10 min</option>
          <option value="11">11 min</option>
          <option value="12">12 min</option>
          <option value="13">13 min</option>
          <option value="14">14 min</option>
          <option value="15">15 min</option>
          <option value="20">20 min</option>
          <option value="25">25 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
        </select>
      </div>
      <div style="flex:1;">
        <div class="metric-label" style="margin-bottom:6px;">Tone range (sec)</div>
        <div class="row">
          <input type="number" id="tone-min" min="2" max="30" value="3" class="tone-input">
          <span style="color:var(--color-text-secondary); font-size:13px;">–</span>
          <input type="number" id="tone-max" min="5" max="120" value="10" class="tone-input">
        </div>
      </div>
    </div>
    <div class="row" style="margin-bottom: 10px;">
      <div style="flex:1;">
        <div class="metric-label" style="margin-bottom:6px;">Tone</div>
        <select id="tone-select" style="width:100%; padding: 8px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px;">
          <option value="pure" selected>Pure (A4)</option>
          <option value="warm">Warm (E4 triangle)</option>
          <option value="soft">Soft (G4)</option>
          <option value="bell">Bell (C5)</option>
          <option value="low">Low (D4)</option>
          <option value="flute">Flute (D5)</option>
        </select>
      </div>
      <div style="flex:1;">
        <div class="metric-label" style="margin-bottom:6px;">Mode</div>
        <div class="row" style="gap:10px;">
          <label style="font-size:13px; color:var(--color-text-primary); display:flex; align-items:center; gap:4px; cursor:pointer;">
            <input type="checkbox" id="wiggly-toggle"> Wiggly
          </label>
          <label style="font-size:13px; color:var(--color-text-primary); display:flex; align-items:center; gap:4px; cursor:pointer;">
            <input type="checkbox" id="cue-toggle" checked> Cue
          </label>
        </div>
      </div>
    </div>
  </div>

  <div id="tap-zone" onclick="handleTap()">
    <div id="status-icon">◉</div>
    <div id="status-text">Tap to start</div>
    <div id="status-sub">Ready when you are</div>
  </div>

  <div class="grid3" style="margin: 0.75rem 0;">
    <div class="metric">
      <div class="metric-label">Session</div>
      <div class="metric-value muted" id="timer-display">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Last RT</div>
      <div class="metric-value muted" id="last-rt">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Avg RT</div>
      <div class="metric-value muted" id="avg-rt">—</div>
    </div>
  </div>

  <div class="grid2" style="margin-bottom: 0.75rem;">
    <div class="metric">
      <div class="metric-label">Rounds</div>
      <div class="metric-value muted" id="round-count">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Best RT</div>
      <div class="metric-value muted" id="best-rt">—</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; margin-bottom:1rem;">
    <button class="btn" id="stop-btn" onclick="endSession()" disabled>End session</button>
    <button class="btn" id="reset-btn" onclick="resetAll()" style="margin-left:auto;">Reset</button>
  </div>

  <div id="history-section" style="display:none;">
    <div class="metric-label" style="margin-bottom:8px;">Recent rounds</div>
    <div id="history-list"></div>
  </div>
</div>

<script>
let wakeLock = null;

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch (err) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

document.addEventListener('visibilitychange', async () => {
  if (wakeLock && document.visibilityState === 'visible') {
    await requestWakeLock();
  }
});

let audioCtx = null;
let oscillator = null;   // primary oscillator (osc1)
let osc2 = null;         // detuned sibling oscillator
let gainNode = null;     // master envelope (all cutoffs act on this)
let filterNode = null;   // lowpass, placed before the reverb send
let voiceNodes = null;   // { oscMix1, oscMix2, dry, wet, convolver }
let shimmerOsc = null;   // dedicated 2nd-harmonic osc for shimmer LFO
let shimmerGain = null;
let wiggleInterval = null;
let modulationInterval = null;
let modulationParams = null;
let cachedIR = null;
let sessionWave = null;  // periodic wave built once per session, reused each round

const CUTOFF_TYPES = ['hard', 'linear', 'exponential', 'midfade', 'rolloff'];

function buildRandomWave(ctx) {
  const h1 = 1.0;
  const h2 = randBetween(0.1, 0.5);
  const h3 = randBetween(0.05, 0.25);
  const h4 = randBetween(0.0, 0.1);
  const norm = Math.sqrt(h1*h1 + h2*h2 + h3*h3 + h4*h4);
  const real = new Float32Array([0, h1/norm, h2/norm, h3/norm, h4/norm]);
  const imag = new Float32Array(real.length);
  return ctx.createPeriodicWave(real, imag, { disableNormalization: false });
}

function getReverbIR(ctx) {
  if (cachedIR) return cachedIR;
  const duration = 2.5;
  const rate = ctx.sampleRate;
  const length = Math.max(1, Math.floor(rate * duration));
  const ir = ctx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      const t = i / length;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 3);
    }
  }
  cachedIR = ir;
  return ir;
}

const TONE_PRESETS = {
  pure:  { freq: 440, type: 'sine' },
  warm:  { freq: 330, type: 'triangle' },
  soft:  { freq: 392, type: 'sine' },
  bell:  { freq: 523.25, type: 'sine' },
  low:   { freq: 293.66, type: 'sine' },
  flute: { freq: 587.33, type: 'sine' },
};

let state = 'idle';
let sessionActive = false;
let sessionDuration = 0;
let sessionStart = 0;
let sessionTimer = null;
let roundTimer = null;
let toneStart = 0;
let toneStop = 0;
let listenStart = 0;
let listenTimeout = null;
let rounds = [];
let currentRound = 0;
let missedWindow = 2500;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startTone() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const presetKey = document.getElementById('tone-select').value || 'pure';
  const preset = TONE_PRESETS[presetKey] || TONE_PRESETS.pure;
  const now = ctx.currentTime;

  // Timbre is fixed for the session — use the wave built at session start.
  const wave = sessionWave || buildRandomWave(ctx);

  const baseGain = 0.18;

  // Master envelope — click-free exponential attack from true zero.
  gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0.0001, now);
  gainNode.gain.exponentialRampToValueAtTime(baseGain, now + 0.120);

  // Lowpass (before reverb send so rolloff affects both dry and wet).
  // Starts mid-range so timbre-breathe modulation is seamless.
  filterNode = ctx.createBiquadFilter();
  filterNode.type = 'lowpass';
  filterNode.frequency.setValueAtTime(3750, now);
  filterNode.Q.setValueAtTime(0.7, now);

  // Dry / wet split — per-round random wet 0.25–0.55.
  const wetLevel = randBetween(0.25, 0.55);
  const dryLevel = 1 - wetLevel;
  const dry = ctx.createGain();
  dry.gain.setValueAtTime(dryLevel, now);
  const wet = ctx.createGain();
  wet.gain.setValueAtTime(wetLevel, now);
  const convolver = ctx.createConvolver();
  convolver.buffer = getReverbIR(ctx);

  filterNode.connect(dry);
  filterNode.connect(convolver);
  convolver.connect(wet);
  dry.connect(gainNode);
  wet.connect(gainNode);
  gainNode.connect(ctx.destination);

  // Two detuned oscillators, equal-gain mix.
  const oscMix1 = ctx.createGain();
  const oscMix2 = ctx.createGain();
  oscMix1.gain.setValueAtTime(0.4, now);
  oscMix2.gain.setValueAtTime(0.4, now);
  oscMix1.connect(filterNode);
  oscMix2.connect(filterNode);

  // Detune is the primary rhythm source: two oscillators at fixed offset
  // produce a constant beat frequency. Give each osc its own random-walk
  // detune so the beat rate itself wanders unpredictably.
  const d1Init = randBetween(-6, 0);
  const d2Init = randBetween(0, 6);
  oscillator = ctx.createOscillator();
  oscillator.setPeriodicWave(wave);
  oscillator.frequency.setValueAtTime(preset.freq, now);
  oscillator.detune.setValueAtTime(d1Init, now);
  oscillator.connect(oscMix1);
  oscillator.start();

  osc2 = ctx.createOscillator();
  osc2.setPeriodicWave(wave);
  osc2.frequency.setValueAtTime(preset.freq, now);
  osc2.detune.setValueAtTime(d2Init, now);
  osc2.connect(oscMix2);
  osc2.start();

  // Shimmer osc: not locked to exact 2× (that beats rigidly against the
  // 2nd harmonic of the chorus oscillators). Drift its detune too.
  const shDetInit = randBetween(-20, 20);
  shimmerOsc = ctx.createOscillator();
  shimmerOsc.type = 'sine';
  shimmerOsc.frequency.setValueAtTime(preset.freq * 2, now);
  shimmerOsc.detune.setValueAtTime(shDetInit, now);
  shimmerGain = ctx.createGain();
  shimmerGain.gain.setValueAtTime(0.08, now);
  shimmerOsc.connect(shimmerGain);
  shimmerGain.connect(filterNode);
  shimmerOsc.start();

  voiceNodes = { oscMix1, oscMix2, dry, wet, convolver };

  modulationParams = {
    baseGain,
    lastTickPerf: performance.now(),
    tremoloValue: baseGain, shimmerValue: 0.08, breatheValue: 3750,
    tremoloTarget: baseGain, shimmerTarget: 0.08, breatheTarget: 3750,
    tremoloNextAt: 0, shimmerNextAt: 0, breatheNextAt: 0,
    d1Value: d1Init, d2Value: d2Init, shDetValue: shDetInit,
    d1Target: d1Init, d2Target: d2Init, shDetTarget: shDetInit,
    d1NextAt: 0, d2NextAt: 0, shDetNextAt: 0,
  };

  toneStart = performance.now();
  // Wait for attack to finish so modulation doesn't clobber the ramp.
  setTimeout(() => { if (gainNode) startModulation(); }, 140);
  if (document.getElementById('wiggly-toggle').checked) {
    setTimeout(() => { if (oscillator) startWiggle(); }, 1000);
  }
}

function startModulation() {
  clearInterval(modulationInterval);
  stepModulation();
  modulationInterval = setInterval(stepModulation, 50);
}

// Each parameter retargets on its own irregular schedule. No shared phase,
// no sine — motion is a smoothed random walk so nothing lands on a rhythm.
function retargetTremolo(p) {
  // Gentle amplitude drift only — the main "movement" is now in detune.
  p.tremoloTarget = p.baseGain * randBetween(0.96, 1.04);
  p.tremoloNextAt = performance.now() + randBetween(600, 3500);
}
function retargetShimmer(p) {
  p.shimmerTarget = randBetween(0.03, 0.14);
  p.shimmerNextAt = performance.now() + randBetween(600, 3500);
}
function retargetBreathe(p) {
  p.breatheTarget = randBetween(1500, 6000);
  p.breatheNextAt = performance.now() + randBetween(1500, 7000);
}
function retargetD1(p) {
  p.d1Target = randBetween(-7, 7);
  p.d1NextAt = performance.now() + randBetween(700, 3000);
}
function retargetD2(p) {
  p.d2Target = randBetween(-7, 7);
  p.d2NextAt = performance.now() + randBetween(700, 3000);
}
function retargetShDet(p) {
  p.shDetTarget = randBetween(-30, 30);
  p.shDetNextAt = performance.now() + randBetween(500, 2500);
}

function stepModulation() {
  if (!gainNode || !filterNode || !shimmerGain || !modulationParams) return;
  const p = modulationParams;
  const ctx = getAudioCtx();
  const tNow = ctx.currentTime;
  const rampDur = 0.08;
  const nowMs = performance.now();
  const dt = Math.max(0.001, (nowMs - p.lastTickPerf) / 1000);
  p.lastTickPerf = nowMs;

  if (nowMs >= p.tremoloNextAt) retargetTremolo(p);
  if (nowMs >= p.shimmerNextAt) retargetShimmer(p);
  if (nowMs >= p.breatheNextAt) retargetBreathe(p);
  if (nowMs >= p.d1NextAt) retargetD1(p);
  if (nowMs >= p.d2NextAt) retargetD2(p);
  if (nowMs >= p.shDetNextAt) retargetShDet(p);

  // Smooth toward targets. Detunes smooth slowly for a singing chorus feel.
  p.tremoloValue += (p.tremoloTarget - p.tremoloValue) * (1 - Math.exp(-dt / 1.2));
  p.shimmerValue += (p.shimmerTarget - p.shimmerValue) * (1 - Math.exp(-dt / 1.2));
  p.breatheValue += (p.breatheTarget - p.breatheValue) * (1 - Math.exp(-dt / 2.0));
  p.d1Value      += (p.d1Target      - p.d1Value)      * (1 - Math.exp(-dt / 2.5));
  p.d2Value      += (p.d2Target      - p.d2Value)      * (1 - Math.exp(-dt / 2.5));
  p.shDetValue   += (p.shDetTarget   - p.shDetValue)   * (1 - Math.exp(-dt / 2.0));

  try {
    gainNode.gain.cancelScheduledValues(tNow);
    gainNode.gain.setValueAtTime(gainNode.gain.value, tNow);
    gainNode.gain.linearRampToValueAtTime(p.tremoloValue, tNow + rampDur);
  } catch(e) {}
  try {
    shimmerGain.gain.cancelScheduledValues(tNow);
    shimmerGain.gain.setValueAtTime(shimmerGain.gain.value, tNow);
    shimmerGain.gain.linearRampToValueAtTime(Math.max(0.001, p.shimmerValue), tNow + rampDur);
  } catch(e) {}
  try {
    filterNode.frequency.cancelScheduledValues(tNow);
    filterNode.frequency.setValueAtTime(filterNode.frequency.value, tNow);
    filterNode.frequency.linearRampToValueAtTime(p.breatheValue, tNow + rampDur);
  } catch(e) {}
  if (oscillator) {
    try {
      oscillator.detune.cancelScheduledValues(tNow);
      oscillator.detune.setValueAtTime(oscillator.detune.value, tNow);
      oscillator.detune.linearRampToValueAtTime(p.d1Value, tNow + rampDur);
    } catch(e) {}
  }
  if (osc2) {
    try {
      osc2.detune.cancelScheduledValues(tNow);
      osc2.detune.setValueAtTime(osc2.detune.value, tNow);
      osc2.detune.linearRampToValueAtTime(p.d2Value, tNow + rampDur);
    } catch(e) {}
  }
  if (shimmerOsc) {
    try {
      shimmerOsc.detune.cancelScheduledValues(tNow);
      shimmerOsc.detune.setValueAtTime(shimmerOsc.detune.value, tNow);
      shimmerOsc.detune.linearRampToValueAtTime(p.shDetValue, tNow + rampDur);
    } catch(e) {}
  }
}

function startWiggle() {
  clearInterval(wiggleInterval);
  const step = () => {
    if (!oscillator) return;
    const ctx = getAudioCtx();
    const target = 260 + Math.random() * 540; // 260–800 Hz
    const dur = 0.12 + Math.random() * 0.25;
    const t = ctx.currentTime;
    [oscillator, osc2].forEach(o => {
      if (!o) return;
      try {
        o.frequency.cancelScheduledValues(t);
        o.frequency.setValueAtTime(o.frequency.value, t);
        o.frequency.linearRampToValueAtTime(target, t + dur);
      } catch(e) {}
    });
    if (shimmerOsc) {
      try {
        shimmerOsc.frequency.cancelScheduledValues(t);
        shimmerOsc.frequency.setValueAtTime(shimmerOsc.frequency.value, t);
        shimmerOsc.frequency.linearRampToValueAtTime(target * 2, t + dur);
      } catch(e) {}
    }
  };
  step();
  wiggleInterval = setInterval(step, 220);
}

function stopTone() {
  clearInterval(wiggleInterval); wiggleInterval = null;
  clearInterval(modulationInterval); modulationInterval = null;
  if (!gainNode || !oscillator) return;
  const ctx = getAudioCtx();
  const o1 = oscillator;
  const o2 = osc2;
  const sh = shimmerOsc;
  const shG = shimmerGain;
  const gn = gainNode;
  const filt = filterNode;
  const extras = voiceNodes;
  oscillator = null; osc2 = null; gainNode = null; filterNode = null;
  voiceNodes = null; shimmerOsc = null; shimmerGain = null;
  modulationParams = null;

  const now = ctx.currentTime;
  const antiClick = 0.04;
  const cutoff = CUTOFF_TYPES[Math.floor(Math.random() * CUTOFF_TYPES.length)];
  let endAt;

  // Cancel all scheduled modulation values and pin each param to its current
  // value before the cutoff envelope takes over.
  gn.gain.cancelScheduledValues(now);
  gn.gain.setValueAtTime(gn.gain.value, now);
  if (filt) {
    filt.frequency.cancelScheduledValues(now);
    filt.frequency.setValueAtTime(filt.frequency.value, now);
  }
  if (shG) {
    shG.gain.cancelScheduledValues(now);
    shG.gain.setValueAtTime(shG.gain.value, now);
  }
  const curGain = gn.gain.value;

  if (cutoff === 'hard') {
    gn.gain.linearRampToValueAtTime(0, now + antiClick);
    endAt = now + antiClick;
  } else if (cutoff === 'linear') {
    const dur = 0.5 + Math.random() * 2.5;
    gn.gain.linearRampToValueAtTime(0, now + dur);
    endAt = now + dur;
  } else if (cutoff === 'exponential') {
    const dur = 0.5 + Math.random() * 2.5;
    gn.gain.exponentialRampToValueAtTime(0.0008, now + dur);
    gn.gain.linearRampToValueAtTime(0, now + dur + antiClick);
    endAt = now + dur + antiClick;
  } else if (cutoff === 'midfade') {
    const dur = 0.5 + Math.random() * 2.5;
    const cutPct = 0.2 + Math.random() * 0.6;
    const cutTime = dur * cutPct;
    gn.gain.linearRampToValueAtTime(0, now + dur);
    setTimeout(() => {
      const t = ctx.currentTime;
      try {
        gn.gain.cancelScheduledValues(t);
        gn.gain.setValueAtTime(gn.gain.value, t);
        gn.gain.linearRampToValueAtTime(0, t + antiClick);
      } catch(e){}
    }, cutTime * 1000);
    endAt = now + cutTime + antiClick;
  } else { // rolloff
    const dur = 1 + Math.random();
    if (filt) {
      filt.frequency.exponentialRampToValueAtTime(200, now + dur);
    }
    gn.gain.setValueAtTime(curGain, now + dur);
    gn.gain.linearRampToValueAtTime(0, now + dur + antiClick);
    endAt = now + dur + antiClick;
  }

  const fadeMs = Math.max(40, (endAt - now) * 1000);
  const cleanupMs = fadeMs + 40;
  setTimeout(() => {
    try { if (o1) { o1.stop(); o1.disconnect(); } } catch(e){}
    try { if (o2) { o2.stop(); o2.disconnect(); } } catch(e){}
    try { if (sh) { sh.stop(); sh.disconnect(); } } catch(e){}
    try { if (shG) shG.disconnect(); } catch(e){}
    try { if (filt) filt.disconnect(); } catch(e){}
    try { if (gn) gn.disconnect(); } catch(e){}
    if (extras) {
      try { extras.oscMix1.disconnect(); } catch(e){}
      try { extras.oscMix2.disconnect(); } catch(e){}
      try { extras.dry.disconnect(); } catch(e){}
      try { extras.wet.disconnect(); } catch(e){}
      try { extras.convolver.disconnect(); } catch(e){}
    }
  }, cleanupMs);
  toneStop = performance.now();
  return fadeMs; // ms until gain reaches zero — caller uses this to time listenStart
}

function playCue(done) {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const presetKey = document.getElementById('tone-select').value || 'pure';
  const preset = TONE_PRESETS[presetKey] || TONE_PRESETS.pure;
  const t0 = ctx.currentTime;
  const beat = 60 / 80; // 0.75s per beat at 80 bpm
  const bipLen = 0.12;
  for (let i = 0; i < 3; i++) {
    const start = t0 + i * beat;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.18, start + 0.01);
    g.gain.linearRampToValueAtTime(0, start + bipLen);
    g.connect(ctx.destination);
    const o = ctx.createOscillator();
    o.type = preset.type;
    o.frequency.setValueAtTime(preset.freq, start);
    o.connect(g);
    o.start(start);
    o.stop(start + bipLen + 0.02);
  }
  // sustain starts on beat 4
  setTimeout(done, 3 * beat * 1000);
}

function playEndChime() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const t0 = ctx.currentTime;
  // gentle ascending three-note chime: C5, E5, G5
  const notes = [523.25, 659.25, 783.99];
  const len = 0.35;
  const gap = 0.12;
  notes.forEach((f, i) => {
    const start = t0 + i * gap;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.16, start + 0.02);
    g.gain.linearRampToValueAtTime(0, start + len);
    g.connect(ctx.destination);
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(f, start);
    o.connect(g);
    o.start(start);
    o.stop(start + len + 0.05);
  });
}

function randBetween(a, b) { return a + Math.random() * (b - a); }

function startRound() {
  if (!sessionActive) return;
  const useCue = document.getElementById('cue-toggle').checked;
  if (useCue) {
    state = 'cue';
    setZone('', '◌', 'Get ready…', 'Attention reset');
    playCue(() => {
      if (!sessionActive) return;
      beginRoundTone();
    });
    return;
  }
  beginRoundTone();
}

function beginRoundTone() {
  state = 'waiting';
  setZone('tone-active', '◎', 'Listening…', 'Tone is playing');
  currentRound++;
  startTone();
  const minS = parseInt(document.getElementById('tone-min').value) || 5;
  const maxS = parseInt(document.getElementById('tone-max').value) || 60;
  const duration = randBetween(minS * 1000, maxS * 1000);
  roundTimer = setTimeout(() => {
    const fadeMs = stopTone();
    // Keep state = 'waiting' during the fade so early taps are ignored.
    // Switch to 'listening' and start the RT clock only when gain hits zero.
    setTimeout(() => {
      if (!sessionActive) return;
      state = 'listening';
      listenStart = performance.now();
      setZone('listening', '◉', 'Tap now!', 'The tone has stopped');
      listenTimeout = setTimeout(() => {
        if (state === 'listening') {
          state = 'missed';
          setZone('missed', '✕', 'Too slow', 'Tap within 2.5s of the tone stopping');
          rounds.push({ round: currentRound, rt: null, missed: true });
          updateStats();
          addHistory(currentRound, null, true);
          setTimeout(startRound, 1500);
        }
      }, missedWindow);
    }, fadeMs);
  }, duration);
}

function handleTap() {
  if (!sessionActive && state === 'idle') {
    beginSession();
    return;
  }
  if (state === 'waiting') {
    return;
  }
  if (state === 'listening') {
    clearTimeout(listenTimeout);
    const rt = performance.now() - listenStart;
    state = 'recorded';
    rounds.push({ round: currentRound, rt, missed: false });
    updateStats();
    addHistory(currentRound, rt, false);
    setZone('', '◎', Math.round(rt) + ' ms', '');
    setTimeout(startRound, 1200);
    return;
  }
  if (state === 'idle' || state === 'done') {
    beginSession();
  }
}

function beginSession() {
  sessionDuration = parseInt(document.getElementById('dur-select').value) * 60 * 1000;
  sessionStart = performance.now();
  sessionActive = true;
  currentRound = 0;
  sessionWave = buildRandomWave(getAudioCtx()); // fixed timbre for the whole session
  document.getElementById('stop-btn').disabled = false;
  document.getElementById('dur-select').disabled = true;
  sessionTimer = setInterval(updateTimer, 500);
  requestWakeLock();
  startRound();
}

function updateTimer() {
  if (!sessionActive) return;
  const elapsed = performance.now() - sessionStart;
  const remaining = Math.max(0, sessionDuration - elapsed);
  if (remaining <= 0) { endSession(); return; }
  const m = Math.floor(remaining / 60000);
  const s = Math.floor((remaining % 60000) / 1000);
  document.getElementById('timer-display').textContent = m + ':' + String(s).padStart(2,'0');
  document.getElementById('timer-display').classList.remove('muted');
}

function endSession() {
  const wasActive = sessionActive;
  sessionActive = false;
  state = 'done';
  clearInterval(sessionTimer);
  clearTimeout(roundTimer);
  clearTimeout(listenTimeout);
  stopTone();
  if (wasActive) { try { playEndChime(); } catch(e){} }
  releaseWakeLock();
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('dur-select').disabled = false;
  const valid = rounds.filter(r => !r.missed);
  if (valid.length > 0) {
    const avg = valid.reduce((a,r)=>a+r.rt,0)/valid.length;
    setZone('', '◎', 'Session done', rounds.length + ' rounds · avg ' + Math.round(avg) + ' ms');
  } else {
    setZone('', '◉', 'Session done', 'No rounds completed');
  }
  document.getElementById('timer-display').textContent = '—';
  document.getElementById('timer-display').classList.add('muted');
}

function resetAll() {
  endSession();
  rounds = [];
  currentRound = 0;
  state = 'idle';
  setZone('', '◉', 'Tap to start', 'Ready when you are');
  document.getElementById('last-rt').textContent = '—';
  document.getElementById('last-rt').classList.add('muted');
  document.getElementById('avg-rt').textContent = '—';
  document.getElementById('avg-rt').classList.add('muted');
  document.getElementById('best-rt').textContent = '—';
  document.getElementById('best-rt').classList.add('muted');
  document.getElementById('round-count').textContent = '0';
  document.getElementById('round-count').classList.add('muted');
  document.getElementById('history-list').innerHTML = '';
  document.getElementById('history-section').style.display = 'none';
}

function updateStats() {
  const valid = rounds.filter(r => !r.missed);
  document.getElementById('round-count').textContent = rounds.length;
  document.getElementById('round-count').classList.remove('muted');
  if (valid.length === 0) return;
  const last = valid[valid.length-1].rt;
  const avg = valid.reduce((a,r)=>a+r.rt,0)/valid.length;
  const best = Math.min(...valid.map(r=>r.rt));
  document.getElementById('last-rt').textContent = Math.round(last) + 'ms';
  document.getElementById('last-rt').classList.remove('muted');
  document.getElementById('avg-rt').textContent = Math.round(avg) + 'ms';
  document.getElementById('avg-rt').classList.remove('muted');
  document.getElementById('best-rt').textContent = Math.round(best) + 'ms';
  document.getElementById('best-rt').classList.remove('muted');
}

function addHistory(round, rt, missed) {
  document.getElementById('history-section').style.display = 'block';
  const list = document.getElementById('history-list');
  const item = document.createElement('div');
  item.className = 'history-item';
  if (missed) {
    item.innerHTML = `<span style="color:var(--color-text-secondary)">Round ${round}</span><span style="color:#A32D2D">missed</span>`;
  } else {
    item.innerHTML = `<span style="color:var(--color-text-secondary)">Round ${round}</span><span>${Math.round(rt)} ms</span>`;
  }
  list.insertBefore(item, list.firstChild);
  if (list.children.length > 10) list.removeChild(list.lastChild);
}

function setZone(cls, icon, text, sub) {
  const z = document.getElementById('tap-zone');
  z.className = cls ? `${cls}` : '';
  document.getElementById('status-icon').textContent = icon;
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-sub').textContent = sub;
}
</script>
